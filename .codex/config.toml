model = "gpt-5.4"
model_reasoning_effort = "medium"
hide_agent_reasoning = true
network_access = true
web_search = "live"
personality = "pragmatic"
developer_instructions = """
実装を開始する場合、Planモードで提示した計画内容を、mdファイルへ書き出すこと。
計画が存在しない場合はこの指示は無視して構わない。
"""

[features]
multi_agent = true
rmcp_client = true
skills = true
unified_exec = true
shell_snapshot = true
steer = true
js_repl = true
prevent_idle_sleep = true

[mcp_servers.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "codex", "--project", ".", "--enable-web-dashboard", "false"]

[tui]
status_line = ["current-dir", "git-branch"]
