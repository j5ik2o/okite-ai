model = "gpt-5.4"
model_reasoning_effort = "high"
hide_agent_reasoning = true
network_access = true
web_search = "live"
personality = "pragmatic"

[features]
rmcp_client = true
skills = true
unified_exec = true
apps = false
shell_snapshot = true
steer = true
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation-focused agent for small targeted fixes."
config_file = "agents/worker.toml"

[mcp_servers.serena]
command = "zsh"
args = ["-lc", "export HOME=\"$PWD/.serena-home\"; mkdir -p \"$HOME\"; exec uvx --from git+https://github.com/oraios/serena serena start-mcp-server --context codex --project . --enable-web-dashboard false"]

[tui]
status_line = ["current-dir", "git-branch"]
